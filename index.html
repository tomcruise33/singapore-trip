:root{--bg:#0f172a;--card:#1e293b;--card-alt:#334155;--accent:#f59e0b;--accent2:#06b6d4;--text:#f1f5f9;--muted:#94a3b8;--bino:#10b981}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--card-alt);border-radius:4px}
.alt-card{background:var(--card-alt);border-left:3px solid var(--accent)}
.bino-alert{background:linear-gradient(135deg,#064e3b,#065f46);border:1px solid var(--bino)}
.time-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);flex-shrink:0;z-index:1}
.time-line{position:absolute;left:5px;top:12px;bottom:0;width:2px;background:#334155}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.day-chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.day-chip.active{background:var(--accent);color:#0f172a}
.day-chip:not(.active){background:var(--card);color:var(--muted)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;font-size:10px;color:var(--muted);cursor:pointer;transition:color .2s;flex:1}
.nav-btn.active{color:var(--accent)}
.loc-link{color:var(--accent2);text-decoration:none;border-bottom:1px dotted var(--accent2);transition:opacity .2s}
.loc-link:active{opacity:.6}
.tip-box{background:#1a1a2e;border:1px solid #312e81;border-radius:8px;padding:8px 10px;font-size:12px;color:#a5b4fc;margin-top:6}
.loc-pill{display:inline-flex;align-items:center;gap:4px;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:3px 8px;font-size:11px;color:var(--accent2);text-decoration:none;margin:2px}
.loc-pill:active{opacity:.6}
</style>

{
  id:2,date:"Sat 28 Feb",title:"Culture, Colour & Grand Chingay",emoji:"🎭",
  hotel:"Hotel Waterloo",hotelAddr:"78 Waterloo St, Singapore",
  dayLocations:[["Serangoon Road Little India Singapore","Serangoon Road"],["Tekka Wet Market Singapore","Tekka Market"],["Sri Veeramakaliamman Temple Singapore","Sri Veeramakaliamman Temple"],["House of Tan Teng Niah Singapore","House of Tan Teng Niah"],["Mustafa Centre Singapore","Mustafa Centre"],["Sultan Mosque Singapore","Sultan Mosque"],["Haji Lane Singapore","Haji Lane"],["Banana Leaf Apolo Singapore","Banana Leaf Apolo"],["Tekka Centre Singapore","Tekka Centre"],["Helix Bridge Singapore","Helix Bridge"],["Marina Bay Singapore","Marina Bay"]],
  events:[
    {time:"12:00 PM",title:"Little India Immersion",desc:"Late start — you landed yesterday and were up 24+ hours. Walk from Waterloo Street into the heart of Little India along Serangoon Road. This is one of Singapore's most vibrant neighborhoods: garlands of jasmine, Bollywood music from every shop, spice traders, and gold jewelry stores. Key stops: the stunning Sri Veeramakaliamman Temple (remove shoes, free entry, photography OK inside), the House of Tan Teng Niah (most colorful house in Singapore — incredible for photos), and the 24/7 Mustafa Centre (a chaotic 6-floor department store where you can buy literally anything at 3 AM).",
      places:[["Serangoon Road Little India Singapore","Serangoon Road"],["Sri Veeramakaliamman Temple Singapore","Sri Veeramakaliamman Temple"],["House of Tan Teng Niah Singapore","House of Tan Teng Niah"],["Mustafa Centre Singapore","Mustafa Centre"],["Tekka Wet Market Singapore","Tekka Wet Market"]],icon:"🪷",

    {time:"3:00 PM",title:"Kampong Glam & Haji Lane",desc:"Walk south into the Malay-Arab Quarter. The golden-domed Sultan Mosque is the centerpiece — stunning from the narrow pedestrian street approach (great framing for photos). Then explore Haji Lane: Singapore's narrowest street, packed with indie boutiques, street art murals, and vintage stores. Walk slowly and check every side alley — the best murals are hidden around corners.",
      places:[["Sultan Mosque Singapore","Sultan Mosque"],["Haji Lane Singapore","Haji Lane"],["Arab Street Singapore","Arab Street"]],icon:"🕌",
      alts:{rain:"Duck into the covered cafés along Arab Street.",tired:"Sit at Maison Ikkoku rooftop bar overlooking Haji Lane.",skip:"Detour to National Gallery Singapore for world-class Southeast Asian art."},
      altPlaces:[["National Gallery Singapore","National Gallery"],["Maison Ikkoku Singapore","Maison Ikkoku"]],
      tip:"Sultan Mosque: free entry, dress modestly (robes provided at entrance)"},
    {time:"5:30 PM",title:"Big Dinner: Chicken Tikka Masala & Naan",desc:"This is your fuel for the Chingay evening — eat well now. Two options: Tekka Centre (budget, authentic, S$6-8 per plate — go to the Indian Muslim stalls on the left side) or Banana Leaf Apolo on Race Course Road (legendary since 1974, fish-head curry is their signature, expect S$15-20). Both are exceptional. Get the garlic naan, it's massive. You won't need to eat again tonight.",
      places:[["Tekka Centre Singapore","Tekka Centre"],["Banana Leaf Apolo Race Course Road Singapore","Banana Leaf Apolo"]],icon:"🍛",
      alts:{rain:"Both options are fully covered — no problem.",tired:"Banana Leaf Apolo has proper seating and AC, go there.",skip:"Grab Zam Zam Murtabak instead if you want something lighter."},
      altPlaces:[["Zam Zam Restaurant Singapore","Zam Zam"]],
      tip:"Banana Leaf Apolo: Race Course Rd · Since 1974 · Fish Head Curry S$20"},
    {time:"8:00 PM",title:"Chingay Parade at Marina Bay",desc:"Singapore's biggest annual street parade — giant illuminated floats, thousands of dancers, pyrotechnics, and cultural performances from Chinese, Malay, Indian, and international troupes. This is massive — think Mardi Gras meets Chinese New Year. Head to Marina Bay area early. Best free viewing spot: position yourself on the Helix Bridge. You get an elevated view of the floats passing below plus the Marina Bay Sands skyline as backdrop. Bring your Crivit binoculars — you'll see the incredible detail on the floats and dancers' costumes that's invisible to the naked eye from the bridge.",
      places:[["Helix Bridge Singapore","Helix Bridge"],["Marina Bay Singapore","Marina Bay"],["F1 Pit Building Singapore","F1 Pit Building"]],icon:"🎆",
      bino:"Position yourself on Helix Bridge and use Crivit binoculars to see float details and dancer costumes up close — free, no tickets needed!",

      altPlaces:[["Esplanade Theatres on the Bay Singapore","Esplanade Waterfront"]],
      tip:"Arrive by 7:30 for a good spot · Parade runs ~2 hours · FREE from Helix Bridge"},
    {time:"10:00 PM",title:"Hotel & Recovery",desc:"Head back to Hotel Waterloo. You've been awake 24+ hours since your flight landed yesterday. Drink plenty of water — Singapore's humidity will dehydrate you fast. The AC in the room will feel like heaven. Tomorrow starts earlier with nature, so get proper sleep.",

      tip:"Tian Tian Chicken Rice: Stall #10, Maxwell · S$5-6 · Queue moves fast"},
    {time:"2:30 PM",title:"Merlion & Marina Bay Daytime",desc:"Walk from Chinatown toward the Merlion. The half-lion half-fish statue is Singapore's icon — kitschy but mandatory. Get your photo, then walk along the waterfront promenade for views of Marina Bay Sands, the ArtScience Museum, and the Esplanade (the durian-shaped building). If the heat is unbearable (it will be around 2-3 PM), escape into The Shoppes at Marina Bay Sands — an insane luxury mall with an indoor canal, a skating rink, and industrial-strength AC.",
      places:[["Merlion Park Singapore","Merlion Park"],["The Shoppes at Marina Bay Sands Singapore","The Shoppes at MBS"],["Esplanade Theatres on the Bay Singapore","Esplanade"],["ArtScience Museum Singapore","ArtScience Museum"]],icon:"🦁",

      tip:"Peak heat 2-4 PM. Use the underground MBS mall as your AC escape."},
    {time:"5:00 PM",title:"Sunday Mass at St Joseph's Church",desc:"Walk back toward your hotel — St Joseph's Church on Victoria Street is literally 2 minutes from Hotel Waterloo. A stunning Portuguese Mission-style church built in 1912 with beautiful stained glass and a peaceful atmosphere. Sunday evening mass is the perfect spiritual reset after days of sensory overload in Singapore's heat. The church interior is cool and quiet. Even if you're not religious, the architecture alone is worth a visit.",
      places:[["St Josephs Church Victoria Street Singapore","St Joseph's Church"]],icon:"⛪",
      alts:{rain:"It's indoors — go regardless.",tired:"Sit in the back pew and simply rest in the quiet.",skip:"Visit the Cathedral of the Good Shepherd instead (larger, also nearby)."},
      altPlaces:[["Cathedral of the Good Shepherd Singapore","Cathedral of the Good Shepherd"]],
      tip:"2 min walk from Hotel Waterloo · Portuguese Mission style · Built 1912"},
    {time:"7:00 PM",title:"Gardens by the Bay: Double Light Show",desc:"Head to Gardens by the Bay for the evening's main event — two free shows back to back. First: Garden Rhapsody at 7:45 PM — the Supertree Grove comes alive with a choreographed music and light show. Lie on the grass and look up (it's better than standing). Grab your spot 15 min early. After the show, walk to the waterfront for Spectra at 9:00 PM — a dramatic water, laser, and light projection show on the Marina Bay Sands fountains. Best viewing from the Event Plaza between the two MBS crystal pavilions. Both shows are completely free.",
      places:[["Supertree Grove Gardens by the Bay Singapore","Supertree Grove"],["Gardens by the Bay Singapore","Gardens by the Bay"],["Marina Bay Sands Event Plaza Singapore","MBS Event Plaza"]],icon:"🌟",
      alts:{rain:"Both shows may be cancelled in heavy rain. Backup: explore MBS mall or watch the Spectra show from inside.",tired:"Just watch Garden Rhapsody lying on the grass, skip Spectra.",skip:"Grab rooftop drinks at LeVeL33 (world's highest urban microbrewery) for bay views instead."},
      altPlaces:[["LeVeL33 Singapore","LeVeL33 Rooftop"]],
      tip:"Garden Rhapsody 7:45 PM · Spectra 9:00 PM · Both FREE · Lie on grass for best view"}

function AltsSection({alts,altPlaces}){
  const[open,setOpen]=useState(false);
  if(!alts) return null;
  const allSame=alts.rain===alts.tired&&alts.tired===alts.skip;
  return(
    <div style={{marginTop:8}}>
      <button onClick={()=>setOpen(!open)} style={{background:'none',border:'1px solid #475569',borderRadius:8,padding:'6px 12px',color:'#94a3b8',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6,width:'100%',justifyContent:'space-between'}}>
        <span>Alternatives</span>
        <span style={{transform:open?'rotate(180deg)':'rotate(0)',transition:'transform .2s',fontSize:10}}>▼</span>
      </button>
      {open&&(
        <div className="fade-in" style={{marginTop:6,borderRadius:8,overflow:'hidden'}}>
          {allSame?(
            <div className="alt-card" style={{padding:'10px 12px',fontSize:13}}>
              <span style={{marginRight:6}}>🌧️🥱🔄</span>{alts.rain}
            </div>
          ):(
            <Fragment>
              <div className="alt-card" style={{padding:'10px 12px',fontSize:13,borderBottom:'1px solid #1e293b'}}>
                <span style={{marginRight:6}}>🌧️</span><strong style={{color:'#94a3b8'}}>Rain:</strong> {alts.rain}
              </div>
              <div className="alt-card" style={{padding:'10px 12px',fontSize:13,borderBottom:'1px solid #1e293b'}}>
                <span style={{marginRight:6}}>🥱</span><strong style={{color:'#94a3b8'}}>Tired:</strong> {alts.tired}
              </div>
              <div className="alt-card" style={{padding:'10px 12px',fontSize:13}}>
                <span style={{marginRight:6}}>🔄</span><strong style={{color:'#94a3b8'}}>Skip it:</strong> {alts.skip}
              </div>
            </Fragment>
          )}
          {altPlaces&&altPlaces.length>0&&(
            <div style={{padding:'6px 10px',display:'flex',flexWrap:'wrap',gap:4,background:'#2d3748'}}>
              {altPlaces.map((p,i)=><MapPill key={i} place={p[0]}>{p[1]}</MapPill>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ItineraryTab(){
  const[activeDay,setActiveDay]=useState(1);
  const scrollRef=useRef(null);
  const contentRef=useRef(null);
  const day=DAYS.find(d=>d.id===activeDay);
  useEffect(()=>{
    if(scrollRef.current){
      const el=scrollRef.current.children[activeDay-1];
      if(el) el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    }
    if(contentRef.current) contentRef.current.scrollTop=0;
  },[activeDay]);
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div ref={scrollRef} style={{display:'flex',gap:6,padding:'10px 16px',overflowX:'auto',background:'#0f172a',borderBottom:'1px solid #1e293b',flexShrink:0}}>
        {DAYS.map(d=>(
          <div key={d.id} className={`day-chip ${d.id===activeDay?'active':''}`} onClick={()=>setActiveDay(d.id)}>
            <span style={{marginRight:4}}>{d.emoji}</span>D{d.id}
          </div>
        ))}
      </div>
      <div ref={contentRef} style={{flex:1,overflowY:'auto',paddingTop:8,paddingBottom:8}}>
        {day&&<DayView day={day}/>}
        <div style={{display:'flex',justifyContent:'center',gap:12,padding:'8px 16px 20px'}}>
          <button disabled={activeDay<=1} onClick={()=>setActiveDay(activeDay-1)} style={{background:activeDay<=1?'#1e293b':'#334155',color:activeDay<=1?'#475569':'#f1f5f9',border:'none',borderRadius:8,padding:'10px 20px',fontSize:13,fontWeight:600,cursor:activeDay<=1?'default':'pointer'}}>← Prev</button>
          <button disabled={activeDay>=8} onClick={()=>setActiveDay(activeDay+1)} style={{background:activeDay>=8?'#1e293b':'#f59e0b',color:activeDay>=8?'#475569':'#0f172a',border:'none',borderRadius:8,padding:'10px 20px',fontSize:13,fontWeight:600,cursor:activeDay>=8?'default':'pointer'}}>Next →</button>
        </div>
      </div>
    </div>
  );
}

  const filtered=ALL_LOCATIONS.filter(l=>{
    const q=l[0].toLowerCase();
    const matchSearch=l[1].toLowerCase().includes(search.toLowerCase());
    if(filter==='sg') return matchSearch&&!q.includes('melaka')&&!q.includes('malacca')&&!q.includes('sentosa')&&!q.includes('ubin');
    if(filter==='melaka') return matchSearch&&(q.includes('melaka')||q.includes('malacca'));
    if(filter==='sentosa') return matchSearch&&q.includes('sentosa');
    return matchSearch;
  });
  return(
    <div style={{padding:16,height:'100%',overflowY:'auto'}}>
      <h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>All Locations ({ALL_LOCATIONS.length})</h2>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search locations..." style={{width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid #334155',background:'#1e293b',color:'#f1f5f9',fontSize:14,marginBottom:10,outline:'none'}}/>
      <div style={{display:'flex',gap:6,marginBottom:14,overflowX:'auto'}}>
        {Object.entries(cats).map(([k,v])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:'4px 12px',borderRadius:999,fontSize:12,fontWeight:600,border:'none',cursor:'pointer',background:filter===k?'#f59e0b':'#1e293b',color:filter===k?'#0f172a':'#94a3b8',whiteSpace:'nowrap',flexShrink:0}}>{v}</button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {filtered.map((l,i)=>(
          <a key={i} href={mapsUrl(l[0])} target="_blank" rel="noopener" style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#1e293b',borderRadius:10,padding:'12px 14px',textDecoration:'none',color:'#f1f5f9'}}>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>{l[1]}</div>
              <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{l[2]}{l[3]?' · '+l[3]:''}</div>
            </div>
            <span style={{color:'#06b6d4',fontSize:18}}>→</span>
          </a>
        ))}
        {filtered.length===0&&<p style={{color:'#64748b',textAlign:'center',padding:20}}>No locations found.</p>}
      </div>
    </div>
  );
}

function QuickRefTab(){
  const[openSec,setOpenSec]=useState(null);
  return(
    <div style={{padding:16,height:'100%',overflowY:'auto'}}>
      <h2 style={{fontSize:18,fontWeight:800,marginBottom:12}}>Quick Reference</h2>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {QUICK_REF.map((sec,i)=>(
          <div key={i} style={{background:'#1e293b',borderRadius:12,overflow:'hidden'}}>
            <button onClick={()=>setOpenSec(openSec===i?null:i)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',background:'none',border:'none',color:'#f1f5f9',cursor:'pointer',fontSize:15,fontWeight:700}}>
              <span>{sec.icon} {sec.title}</span>
              <span style={{transform:openSec===i?'rotate(180deg)':'rotate(0)',transition:'transform .2s',fontSize:12,color:'#94a3b8'}}>▼</span>
            </button>
            {openSec===i&&(
              <div className="fade-in" style={{padding:'0 16px 14px',display:'flex',flexDirection:'column',gap:8}}>
                {sec.items.map((item,j)=>(
                  <div key={j} style={{background:'#0f172a',borderRadius:8,padding:'10px 12px'}}>
                    <div style={{fontSize:13,fontWeight:600}}>{item.label}</div>
                    <div style={{fontSize:12,color:'#94a3b8',marginTop:2,lineHeight:1.4}}>{item.detail}</div>
                    {item.map&&<div style={{marginTop:4}}><MapLink place={item.map}>Open in Maps →</MapLink></div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
      <div style={{marginTop:24,background:'#1e293b',borderRadius:12,padding:16}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:8}}>🔭 Binocular Schedule (Crivit 12x36)</h3>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {[
            ["Day 2","Bird Paradise — Predators on Wings show"],
            ["Day 6 AM","Batu Berendam — Asian Openbill storks at dawn"],
            ["Day 7 AM","MacRitchie — canopy macaques & drongos"],
            ["Day 7 PM","Pulau Ubin — wild hornbills & otters"]
          ].map((b,i)=>(
            <div key={i} className="bino-alert" style={{padding:'8px 10px',borderRadius:8,fontSize:12}}>
              <strong>{b[0]}:</strong> {b[1]}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState('itinerary');
  return(
    <div style={{maxWidth:480,margin:'0 auto',height:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{background:'linear-gradient(135deg,#0f172a,#1e1b4b)',padding:'14px 16px 10px',textAlign:'center',borderBottom:'1px solid #1e293b',flexShrink:0}}>
        <h1 style={{fontSize:16,fontWeight:800,letterSpacing:1}}>🇸🇬 SG & Melaka 2026 🇲🇾</h1>
        <p style={{fontSize:11,color:'#94a3b8',marginTop:2}}>Feb 27 – Mar 6 · 8 Days · 2 Travelers</p>
      </header>
      <main style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='itinerary'&&<ItineraryTab/>}
        {tab==='locations'&&<LocationsTab/>}
        {tab==='quickref'&&<QuickRefTab/>}
      </main>
      <nav style={{background:'#0f172a',borderTop:'1px solid #1e293b',display:'flex',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom)'}}>
        {[
          {id:'itinerary',label:'Itinerary',icon:'📅'},
          {id:'locations',label:'Locations',icon:'📍'},
          {id:'quickref',label:'Reference',icon:'📋'}
        ].map(n=>(
          <div key={n.id} className={`nav-btn ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span>{n.label}</span>
          </div>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
